<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise for You 💖</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Section 1: The Envelope -->
        <div id="envelope-section" class="section show">
            <div class="envelope-wrapper">
                <div id="envelope" class="envelope-container">
                    <div class="envelope-wrapper-css">
                        <div class="envelope-back"></div>
                        <div class="letter-small">
                            <div class="text-mini">💖</div>
                        </div>
                        <div class="envelope-front"></div>
                        <div class="envelope-top"></div>
                    </div>
                </div>
                <p class="instruction">Tap to open your mail</p>
                <div class="heart-pulse-new">💖</div>
            </div>
        </div>

        <!-- Section 2: The Letter -->
        <div id="letter-section" class="section">
            <div class="letter-card glass">
                <h1 class="dear">Dear Crush,</h1>
                <p class="message">I really, really like you... <br> Do you like me too?</p>
                <div class="button-group">
                    <button id="yes-btn" class="cute-btn primary">Yes! 🥰</button>
                    <button id="no-btn" class="cute-btn secondary">No 🥺</button>
                </div>
            </div>
        </div>

        <!-- Section 3: The Yey Page -->
        <div id="yey-section" class="section">
            <div class="yey-card">
                <h1 class="yey-title">YESSSS! WOOHOO! 🎉</h1>
                <img src="yey.png" alt="Happy Celebration" class="yey-img">
                <p class="yey-message">I knew you'd say yes! <br> Best day ever! 💖✨</p>
            </div>
        </div>
    </div>

    <!-- Floating Hearts Area -->
    <div id="hearts-bg" class="hearts-bg"></div>

    <script src="script.js"></script>
</body>
</html>
